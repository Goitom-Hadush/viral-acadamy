[phases.setup]
  nixpkgsArchive = "e24b4c09e963677b1beea49d411cd315a024ad3a"
  nixPkgs = ["...", "php", "php83Packages.composer", "nodejs"]

[phases.install]
  dependsOn = ["setup"]
  cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install --omit=dev --legacy-peer-deps"
  ]

[phases.build]
  dependsOn = ["install"]
  cmds = ["npm run build"]

[phases.deploy]
  dependsOn = ["build"]
  cmds = ["php artisan key:generate --force", "php artisan migrate --force"]

[start]
  cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
